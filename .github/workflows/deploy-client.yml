name: Deploy Client to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: ''

      - name: Deploy to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 153.92.9.238
          port: 65002
          username: u673267555
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'client/dist/.'
          target: /home/u673267555/domains/slateblue-crow-206906.hostingersite.com/public_html
          strip_components: 2
